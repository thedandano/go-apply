version: "2"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/thedandano/go-apply

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gocritic
    - revive
    - gosec
    - bodyclose
    - noctx
    - prealloc

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - exitAfterDefer
    gosec:
      excludes:
        - G104
        - G204
        - G301
        - G302
        - G304
        - G306
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprintf
        - (io.Closer).Close
        - (*os.File).Close
        - (*compress/gzip.Reader).Close
        - (net/http.Response.Body).Close
        - os.Remove
        - os.WriteFile
        - (*encoding/json.Encoder).Encode
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

issues:
  exclusions:
    paths:
      - .worktrees
      - spike

run:
  timeout: 5m
