linters:
  enable:
    - gofmt
    - goimports
    - govet
    - staticcheck
    - errcheck
    - gosimple
    - ineffassign
    - unused
    - gocritic
    - revive
    - gosec
    - bodyclose
    - noctx
    - prealloc

linters-settings:
  goimports:
    local-prefixes: github.com/thedandano/go-apply
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - hugeParam  # port interfaces enforce value types; can't pointer-ify without changing the interface
  gosec:
    excludes:
      - G304
      - G501  # crypto/md5 used as cache key (URL → filename), not for security

issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec, errcheck]

run:
  timeout: 5m
  go: "1.23"
