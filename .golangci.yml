linters:
  enable:
    - gofmt
    - goimports
    - govet
    - staticcheck
    - errcheck
    - gosimple
    - ineffassign
    - unused
    - gocritic
    - revive
    - gosec
    - bodyclose
    - noctx
    - prealloc

linters-settings:
  goimports:
    local-prefixes: github.com/thedandano/go-apply
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
  gosec:
    excludes:
      - G304

issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec, errcheck]

run:
  timeout: 5m
  go: "1.23"
  skip-dirs:
    - .worktrees
    - spike
